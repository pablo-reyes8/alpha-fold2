metadata:
  name: alphafold2_full_reference
  description: Reference AlphaFold2/OpenFold hyperparameters for future scaling.
  status: reference_only
  sources:
    - https://github.com/google-deepmind/alphafold/blob/main/alphafold/model/config.py
    - https://github.com/aqlaboratory/openfold/blob/main/openfold/config.py
    - https://github.com/aqlaboratory/openfold/blob/main/openfold/utils/lr_schedulers.py
  notes:
    - Includes template, extra MSA and auxiliary loss settings that the current repo does not fully consume yet.
    - Training defaults below reflect OpenFold reference settings when explicitly defined.

globals:
  c_m: 256
  c_z: 128
  c_t: 64
  c_e: 64
  c_s: 384
  num_recycle: 3
  max_relative_feature: 32
  max_templates: 4
  precision: bf16
  eps: 1.0e-8

data:
  common:
    max_extra_msa: 1024
    resample_msa_in_recycling: true
    reduce_msa_clusters_by_max_templates: false
    use_templates: false
    use_template_torsion_angles: false
    masked_msa:
      profile_prob: 0.1
      same_prob: 0.1
      uniform_prob: 0.1
      replace_fraction: 0.15
  initial_training:
    crop_size: 256
    max_msa_clusters: 128
    max_extra_msa: 1024
    subsample_templates: true
    block_delete_msa: true
    clamp_prob: 0.9
    max_distillation_msa_clusters: 1000
    distillation_prob: 0.75
  finetuning:
    crop_size: 384
    max_msa_clusters: 512
    max_extra_msa: 5120
    subsample_templates: true
    block_delete_msa: true
    violation_weight: 1.0
    experimentally_resolved_weight: 0.01

model:
  input_embedder:
    tf_dim: 22
    msa_dim: 49
    relpos_k: 32
  recycling_embedder:
    min_bin: 3.25
    max_bin: 20.75
    num_bins: 15
  extra_msa:
    enabled: true
    c_in: 25
    c_out: 64
    no_blocks: 4
    c_hidden_msa_att: 8
    c_hidden_opm: 32
    c_hidden_mul: 128
    c_hidden_pair_att: 32
    no_heads_msa: 8
    no_heads_pair: 4
    transition_n: 4
    msa_dropout: 0.15
    pair_dropout: 0.25
  evoformer:
    no_blocks: 48
    c_hidden_msa_att: 32
    c_hidden_opm: 32
    c_hidden_mul: 128
    c_hidden_pair_att: 32
    no_heads_msa: 8
    no_heads_pair: 4
    transition_n: 4
    msa_dropout: 0.15
    pair_dropout: 0.25
  template:
    enabled: false
    embed_angles: false
    use_unit_vector: false
    average_templates: false
    offload_templates: false
    distogram:
      min_bin: 3.25
      max_bin: 50.75
      num_bins: 39
    pair_stack:
      no_blocks: 2
      c_hidden_tri_att: 16
      c_hidden_tri_mul: 64
      no_heads: 4
      pair_transition_n: 2
      dropout_rate: 0.25
  structure_module:
    no_blocks: 8
    c_ipa: 16
    c_resnet: 128
    no_heads_ipa: 12
    no_qk_points: 4
    no_v_points: 8
    no_transition_layers: 1
    no_resnet_blocks: 2
    no_angles: 7
    dropout_rate: 0.1
    trans_scale_factor: 10.0

heads:
  distogram:
    num_bins: 64
    weight: 0.3
    min_bin: 2.3125
    max_bin: 21.6875
  plddt:
    num_bins: 50
    hidden_channels: 128
    cutoff: 15.0
    weight: 0.01
  experimentally_resolved:
    output_channels: 37
    weight: 0.0
  masked_msa:
    output_channels: 23
    weight: 2.0
  tm:
    enabled: false
    num_bins: 64
    max_bin: 31
    weight: 0.0

loss:
  fape:
    backbone:
      clamp_distance: 10.0
      loss_unit_distance: 10.0
      weight: 0.5
    sidechain:
      clamp_distance: 10.0
      length_scale: 10.0
      weight: 0.5
    weight: 1.0
    eps: 1.0e-4
  distogram:
    min_bin: 2.3125
    max_bin: 21.6875
    num_bins: 64
    weight: 0.3
  plddt_loss:
    cutoff: 15.0
    num_bins: 50
    weight: 0.01
  supervised_chi:
    chi_weight: 0.5
    angle_norm_weight: 0.01
    weight: 1.0
  masked_msa:
    num_classes: 23
    weight: 2.0
  experimentally_resolved:
    min_resolution: 0.1
    max_resolution: 3.0
    weight: 0.0
  violation:
    violation_tolerance_factor: 12.0
    clash_overlap_tolerance: 1.5
    weight: 0.0

optimizer:
  name: Adam
  learning_rate: 1.0e-3
  eps: 1.0e-5

scheduler:
  name: alphafold_plateau_exponential
  base_lr: 0.0
  max_lr: 1.0e-3
  warmup_no_steps: 1000
  start_decay_after_n_steps: 50000
  decay_every_n_steps: 50000
  decay_factor: 0.95

ema:
  decay: 0.999
